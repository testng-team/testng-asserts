name: Release

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Release version (e.g. 1.0.0). Defaults to the current version without -SNAPSHOT.'
        required: false
        default: ''
      nextVersion:
        description: 'Next development version (e.g. 1.0.1-SNAPSHOT). Defaults to the release patch + 1, with -SNAPSHOT.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Java and Maven
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Configure Git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Resolve and validate versions
        id: versions
        env:
          RELEASE_INPUT: ${{ github.event.inputs.releaseVersion }}
          NEXT_INPUT: ${{ github.event.inputs.nextVersion }}
        run: |
          set -euo pipefail
          CURRENT="$(./mvnw -q help:evaluate -Dexpression=project.version -DforceStdout)"
          echo "Current project version: $CURRENT"

          RELEASE="$RELEASE_INPUT"
          if [ -z "$RELEASE" ]; then
            RELEASE="${CURRENT%-SNAPSHOT}"
          fi

          NEXT="$NEXT_INPUT"
          if [ -z "$NEXT" ]; then
            MAJOR="${RELEASE%%.*}"
            REST="${RELEASE#*.}"
            MINOR="${REST%%.*}"
            PATCH="${REST#*.}"
            PATCH="${PATCH%%[-+]*}"
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"
          fi

          # Strict validation: release must be a plain semver, next must be a -SNAPSHOT semver.
          if ! printf '%s' "$RELEASE" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid release version: '$RELEASE' (expected e.g. 1.0.0)"; exit 1
          fi
          if ! printf '%s' "$NEXT" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+-SNAPSHOT$'; then
            echo "::error::Invalid next version: '$NEXT' (expected e.g. 1.0.1-SNAPSHOT)"; exit 1
          fi

          echo "Releasing $RELEASE, next development version $NEXT"
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Set release version
        env:
          RELEASE: ${{ steps.versions.outputs.release }}
        run: ./mvnw -q versions:set -DnewVersion="$RELEASE" -DgenerateBackupPoms=false

      - name: Build and verify
        run: ./mvnw --no-transfer-progress clean verify

      - name: Deploy release to Maven Central
        run: ./mvnw --no-transfer-progress deploy -Pdeploy
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Commit and tag release
        env:
          RELEASE: ${{ steps.versions.outputs.release }}
        run: |
          set -euo pipefail
          git commit -am "release: v${RELEASE}"
          git tag -a "v${RELEASE}" -m "Release v${RELEASE}"

      - name: Prepare next development iteration
        env:
          NEXT: ${{ steps.versions.outputs.next }}
        run: |
          set -euo pipefail
          ./mvnw -q versions:set -DnewVersion="$NEXT" -DgenerateBackupPoms=false
          git commit -am "chore: prepare next development iteration ${NEXT}"

      - name: Push commits and tag
        env:
          RELEASE: ${{ steps.versions.outputs.release }}
        run: |
          set -euo pipefail
          git push origin main
          git push origin "v${RELEASE}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE: ${{ steps.versions.outputs.release }}
        run: gh release create "v${RELEASE}" --title "v${RELEASE}" --generate-notes --verify-tag
